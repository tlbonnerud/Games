<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </radialGradient>
    <radialGradient id="cookieGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4956a"/>
      <stop offset="50%" stop-color="#b5692a"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </radialGradient>
    <radialGradient id="goldCookie" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="60%" stop-color="#f4a000"/>
      <stop offset="100%" stop-color="#c47800"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="drop">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Ambient glow behind main cookie -->
  <circle cx="800" cy="480" r="280" fill="#b5692a" opacity="0.08"/>
  <circle cx="800" cy="480" r="200" fill="#d4956a" opacity="0.06"/>

  <!-- Falling cookie crumbs (small circles) -->
  <g opacity="0.5">
    <circle cx="120" cy="150" r="8" fill="#c8722a"/><circle cx="200" cy="80" r="5" fill="#a0521a"/>
    <circle cx="350" cy="200" r="6" fill="#c8722a"/><circle cx="480" cy="120" r="9" fill="#8b4513"/>
    <circle cx="160" cy="320" r="5" fill="#d4956a"/><circle cx="300" cy="380" r="7" fill="#c8722a"/>
    <circle cx="90" cy="500" r="6" fill="#a0521a"/><circle cx="240" cy="600" r="8" fill="#8b4513"/>
    <circle cx="400" cy="700" r="5" fill="#c8722a"/><circle cx="130" cy="730" r="6" fill="#d4956a"/>
    <circle cx="1100" cy="100" r="7" fill="#c8722a"/><circle cx="1300" cy="180" r="5" fill="#a0521a"/>
    <circle cx="1450" cy="90" r="8" fill="#8b4513"/><circle cx="1200" cy="300" r="6" fill="#d4956a"/>
    <circle cx="1380" cy="400" r="7" fill="#c8722a"/><circle cx="1500" cy="550" r="5" fill="#a0521a"/>
    <circle cx="1100" cy="680" r="8" fill="#8b4513"/><circle cx="1420" cy="720" r="6" fill="#c8722a"/>
  </g>

  <!-- Small floating cookies (left side) -->
  <g filter="url(#drop)" opacity="0.7">
    <!-- Cookie top-left -->
    <circle cx="160" cy="220" r="45" fill="url(#cookieGrad)"/>
    <circle cx="148" cy="208" r="6" fill="#6b3010"/><circle cx="170" cy="235" r="5" fill="#6b3010"/>
    <circle cx="155" cy="250" r="4" fill="#6b3010"/><circle cx="175" cy="215" r="5" fill="#6b3010"/>
    <!-- Cookie mid-left -->
    <circle cx="100" cy="560" r="38" fill="url(#cookieGrad)"/>
    <circle cx="90" cy="548" r="5" fill="#6b3010"/><circle cx="112" cy="568" r="4" fill="#6b3010"/>
    <circle cx="98" cy="575" r="5" fill="#6b3010"/>
  </g>

  <!-- Small floating cookies (right side) -->
  <g filter="url(#drop)" opacity="0.7">
    <circle cx="1440" cy="200" r="42" fill="url(#cookieGrad)"/>
    <circle cx="1428" cy="190" r="5" fill="#6b3010"/><circle cx="1452" cy="210" r="6" fill="#6b3010"/>
    <circle cx="1440" cy="225" r="4" fill="#6b3010"/>
    <circle cx="1480" cy="580" r="36" fill="url(#cookieGrad)"/>
    <circle cx="1470" cy="568" r="5" fill="#6b3010"/><circle cx="1492" cy="588" r="4" fill="#6b3010"/>
    <circle cx="1476" cy="594" r="5" fill="#6b3010"/>
  </g>

  <!-- Gold cookie (floating, glowing) -->
  <circle cx="1260" cy="350" r="52" fill="url(#goldCookie)" filter="url(#softglow)" opacity="0.85"/>
  <circle cx="1248" cy="336" r="7" fill="#c47800"/><circle cx="1272" cy="360" r="6" fill="#c47800"/>
  <circle cx="1255" cy="372" r="5" fill="#c47800"/><circle cx="1278" cy="342" r="6" fill="#c47800"/>
  <circle cx="1260" cy="350" r="52" fill="none" stroke="#ffe066" stroke-width="2" opacity="0.6"/>

  <!-- Main big cookie -->
  <circle cx="800" cy="480" r="240" fill="url(#cookieGrad)" filter="url(#drop)"/>
  <!-- Cookie texture / cracks -->
  <path d="M720 360 Q760 400 740 450 Q720 500 760 540" stroke="#8b4513" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M880 360 Q840 410 860 460 Q880 510 840 550" stroke="#8b4513" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M700 520 Q750 510 780 540 Q810 570 800 610" stroke="#8b4513" stroke-width="2.5" fill="none" opacity="0.4"/>
  <!-- Chocolate chips -->
  <ellipse cx="720" cy="400" rx="18" ry="14" fill="#3d1a00" transform="rotate(-10,720,400)"/>
  <ellipse cx="880" cy="390" rx="16" ry="13" fill="#3d1a00" transform="rotate(8,880,390)"/>
  <ellipse cx="760" cy="490" rx="20" ry="15" fill="#3d1a00" transform="rotate(-5,760,490)"/>
  <ellipse cx="850" cy="500" rx="17" ry="13" fill="#3d1a00" transform="rotate(12,850,500)"/>
  <ellipse cx="800" cy="580" rx="19" ry="14" fill="#3d1a00" transform="rotate(-8,800,580)"/>
  <ellipse cx="720" cy="560" rx="15" ry="12" fill="#3d1a00" transform="rotate(6,720,560)"/>
  <ellipse cx="870" cy="560" rx="16" ry="13" fill="#3d1a00" transform="rotate(-3,870,560)"/>
  <ellipse cx="790" cy="430" rx="14" ry="11" fill="#3d1a00" transform="rotate(15,790,430)"/>
  <!-- Cookie shine -->
  <ellipse cx="740" cy="380" rx="55" ry="30" fill="#ffffff" opacity="0.07" transform="rotate(-20,740,380)"/>
  <!-- Cookie rim -->
  <circle cx="800" cy="480" r="240" fill="none" stroke="#8b4513" stroke-width="4" opacity="0.3"/>

  <!-- Click sparkles on cookie -->
  <g filter="url(#glow)" opacity="0.8">
    <line x1="800" y1="270" x2="800" y2="240" stroke="#ffd700" stroke-width="3"/>
    <line x1="850" y1="278" x2="870" y2="255" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="750" y1="278" x2="730" y2="255" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="1020" y1="350" x2="1048" y2="340" stroke="#ffd700" stroke-width="2.5"/>
    <line x1="580" y1="350" x2="552" y2="340" stroke="#ffd700" stroke-width="2.5"/>
  </g>

  <!-- "+1" floating text -->
  <text x="940" y="340" font-family="monospace" font-size="32" font-weight="bold" fill="#ffd700" opacity="0.7" filter="url(#glow)">+1</text>
  <text x="630" y="310" font-family="monospace" font-size="24" font-weight="bold" fill="#ffd700" opacity="0.5">+1</text>
  <text x="960" y="440" font-family="monospace" font-size="20" font-weight="bold" fill="#ffd700" opacity="0.4">+1</text>

  <!-- Title -->
  <text x="803" y="143" font-family="serif" font-size="90" font-weight="900" fill="#000" opacity="0.6" text-anchor="middle" letter-spacing="3">Cookie Clicker</text>
  <text x="800" y="140" font-family="serif" font-size="90" font-weight="900" fill="#f4a000" text-anchor="middle" letter-spacing="3" filter="url(#softglow)">Cookie Clicker</text>
  <text x="800" y="140" font-family="serif" font-size="90" font-weight="900" fill="none" stroke="#ffe066" stroke-width="1.5" text-anchor="middle" letter-spacing="3" opacity="0.5">Cookie Clicker</text>

  <!-- Subtitle -->
  <text x="800" y="185" font-family="monospace" font-size="26" fill="#c8722a" text-anchor="middle" letter-spacing="5" opacity="0.9">IDLE CLICKER</text>

  <!-- Cookie count display -->
  <rect x="620" y="770" width="360" height="52" rx="8" fill="#1a0a00" stroke="#b5692a" stroke-width="2" opacity="0.85"/>
  <text x="800" y="803" font-family="monospace" font-size="22" fill="#ffd700" text-anchor="middle" opacity="0.9">0 cookies</text>

  <!-- Scanlines -->
  <g opacity="0.025">
    <rect x="0" y="0" width="1600" height="2" fill="#fff"/><rect x="0" y="6" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="12" width="1600" height="2" fill="#fff"/><rect x="0" y="18" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="24" width="1600" height="2" fill="#fff"/><rect x="0" y="30" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="36" width="1600" height="2" fill="#fff"/><rect x="0" y="42" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="48" width="1600" height="2" fill="#fff"/><rect x="0" y="54" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="60" width="1600" height="2" fill="#fff"/><rect x="0" y="66" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="72" width="1600" height="2" fill="#fff"/><rect x="0" y="78" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="84" width="1600" height="2" fill="#fff"/><rect x="0" y="90" width="1600" height="2" fill="#fff"/>
  </g>
</svg>
