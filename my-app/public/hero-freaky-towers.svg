<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0814"/>
      <stop offset="100%" stop-color="#12082a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1230"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <rect x="60" y="30" width="2" height="2"/><rect x="180" y="70" width="2" height="2"/>
    <rect x="320" y="20" width="3" height="3"/><rect x="480" y="55" width="2" height="2"/>
    <rect x="660" y="35" width="2" height="2"/><rect x="820" y="15" width="3" height="3"/>
    <rect x="980" y="60" width="2" height="2"/><rect x="1120" y="25" width="2" height="2"/>
    <rect x="1280" y="45" width="3" height="3"/><rect x="1440" y="30" width="2" height="2"/>
    <rect x="100" y="130" width="2" height="2"/><rect x="270" y="110" width="2" height="2"/>
    <rect x="440" y="140" width="2" height="2"/><rect x="620" y="95" width="2" height="2"/>
    <rect x="760" y="150" width="2" height="2"/><rect x="930" y="105" width="2" height="2"/>
    <rect x="1080" y="135" width="2" height="2"/><rect x="1350" y="90" width="2" height="2"/>
    <rect x="1520" y="120" width="2" height="2"/>
  </g>

  <!-- Ground platform -->
  <rect x="0" y="760" width="1600" height="140" fill="url(#ground)"/>
  <rect x="0" y="758" width="1600" height="6" fill="#2a1850" opacity="0.8"/>

  <!-- Grid lines on ground -->
  <g stroke="#2a1850" stroke-width="1" opacity="0.4">
    <line x1="0" y1="790" x2="1600" y2="790"/>
    <line x1="0" y1="820" x2="1600" y2="820"/>
    <line x1="0" y1="850" x2="1600" y2="850"/>
    <line x1="200" y1="760" x2="200" y2="900"/>
    <line x1="400" y1="760" x2="400" y2="900"/>
    <line x1="600" y1="760" x2="600" y2="900"/>
    <line x1="800" y1="760" x2="800" y2="900"/>
    <line x1="1000" y1="760" x2="1000" y2="900"/>
    <line x1="1200" y1="760" x2="1200" y2="900"/>
    <line x1="1400" y1="760" x2="1400" y2="900"/>
  </g>

  <!-- ===== TOWER 1 (left, tall, slightly tilted left) ===== -->
  <g transform="rotate(-3, 340, 760)" filter="url(#glow)">
    <!-- Base blocks -->
    <rect x="280" y="720" width="120" height="40" rx="4" fill="#e63946"/>
    <rect x="283" y="723" width="114" height="12" fill="#ff6b6b" opacity="0.4"/>
    <rect x="285" y="680" width="110" height="40" rx="4" fill="#f4a261"/>
    <rect x="288" y="683" width="104" height="12" fill="#ffbe76" opacity="0.4"/>
    <rect x="290" y="640" width="100" height="40" rx="4" fill="#2a9d8f"/>
    <rect x="293" y="643" width="94" height="12" fill="#4ecdc4" opacity="0.4"/>
    <rect x="278" y="600" width="114" height="40" rx="4" fill="#e9c46a"/>
    <rect x="281" y="603" width="108" height="12" fill="#ffd93d" opacity="0.4"/>
    <rect x="292" y="560" width="96" height="40" rx="4" fill="#6a4c93"/>
    <rect x="295" y="563" width="90" height="12" fill="#9b72cf" opacity="0.4"/>
    <rect x="285" y="520" width="110" height="40" rx="4" fill="#e63946"/>
    <rect x="288" y="523" width="104" height="12" fill="#ff6b6b" opacity="0.4"/>
    <rect x="295" y="485" width="90" height="36" rx="4" fill="#f4a261"/>
    <rect x="298" y="488" width="84" height="12" fill="#ffbe76" opacity="0.4"/>
    <!-- Wobble top block -->
    <rect x="288" y="450" width="104" height="36" rx="4" fill="#2a9d8f" transform="rotate(4,340,468)"/>
  </g>

  <!-- ===== TOWER 2 (center, tallest, tilting right) ===== -->
  <g transform="rotate(2, 800, 760)" filter="url(#glow)">
    <rect x="740" y="720" width="120" height="40" rx="4" fill="#2a9d8f"/>
    <rect x="743" y="723" width="114" height="12" fill="#4ecdc4" opacity="0.4"/>
    <rect x="745" y="680" width="110" height="40" rx="4" fill="#e63946"/>
    <rect x="748" y="683" width="104" height="12" fill="#ff6b6b" opacity="0.4"/>
    <rect x="738" y="640" width="124" height="40" rx="4" fill="#e9c46a"/>
    <rect x="741" y="643" width="118" height="12" fill="#ffd93d" opacity="0.4"/>
    <rect x="748" y="600" width="104" height="40" rx="4" fill="#6a4c93"/>
    <rect x="751" y="603" width="98" height="12" fill="#9b72cf" opacity="0.4"/>
    <rect x="742" y="560" width="116" height="40" rx="4" fill="#f4a261"/>
    <rect x="745" y="563" width="110" height="12" fill="#ffbe76" opacity="0.4"/>
    <rect x="750" y="520" width="100" height="40" rx="4" fill="#2a9d8f"/>
    <rect x="753" y="523" width="94" height="12" fill="#4ecdc4" opacity="0.4"/>
    <rect x="744" y="480" width="112" height="40" rx="4" fill="#e63946"/>
    <rect x="747" y="483" width="106" height="12" fill="#ff6b6b" opacity="0.4"/>
    <rect x="748" y="440" width="104" height="40" rx="4" fill="#e9c46a"/>
    <rect x="751" y="443" width="98" height="12" fill="#ffd93d" opacity="0.4"/>
    <rect x="752" y="400" width="96" height="40" rx="4" fill="#6a4c93"/>
    <rect x="755" y="403" width="90" height="12" fill="#9b72cf" opacity="0.4"/>
    <rect x="746" y="362" width="108" height="40" rx="4" fill="#f4a261"/>
    <rect x="749" y="365" width="102" height="12" fill="#ffbe76" opacity="0.4"/>
    <!-- Precarious top -->
    <rect x="750" y="326" width="100" height="38" rx="4" fill="#2a9d8f" transform="rotate(-6, 800, 345)"/>
  </g>

  <!-- ===== TOWER 3 (right, medium, tilting left) ===== -->
  <g transform="rotate(-4, 1260, 760)" filter="url(#glow)">
    <rect x="1200" y="720" width="120" height="40" rx="4" fill="#6a4c93"/>
    <rect x="1203" y="723" width="114" height="12" fill="#9b72cf" opacity="0.4"/>
    <rect x="1205" y="680" width="110" height="40" rx="4" fill="#e63946"/>
    <rect x="1208" y="683" width="104" height="12" fill="#ff6b6b" opacity="0.4"/>
    <rect x="1198" y="640" width="124" height="40" rx="4" fill="#2a9d8f"/>
    <rect x="1201" y="643" width="118" height="12" fill="#4ecdc4" opacity="0.4"/>
    <rect x="1206" y="600" width="108" height="40" rx="4" fill="#e9c46a"/>
    <rect x="1209" y="603" width="102" height="12" fill="#ffd93d" opacity="0.4"/>
    <rect x="1208" y="560" width="104" height="40" rx="4" fill="#f4a261"/>
    <rect x="1211" y="563" width="98" height="12" fill="#ffbe76" opacity="0.4"/>
    <rect x="1202" y="520" width="116" height="40" rx="4" fill="#6a4c93"/>
    <rect x="1205" y="523" width="110" height="12" fill="#9b72cf" opacity="0.4"/>
    <!-- Wobbly top -->
    <rect x="1200" y="482" width="120" height="40" rx="4" fill="#e63946" transform="rotate(5, 1260, 502)"/>
    <rect x="1205" y="448" width="110" height="36" rx="4" fill="#e9c46a" transform="rotate(-3, 1260, 466)"/>
  </g>

  <!-- Falling/floating blocks (physics chaos) -->
  <rect x="150" y="560" width="60" height="30" rx="3" fill="#e9c46a" transform="rotate(-15,180,575)" opacity="0.9" filter="url(#glow)"/>
  <rect x="530" y="480" width="70" height="30" rx="3" fill="#e63946" transform="rotate(20,565,495)" opacity="0.85" filter="url(#glow)"/>
  <rect x="1050" y="520" width="55" height="28" rx="3" fill="#2a9d8f" transform="rotate(-12,1078,534)" opacity="0.9" filter="url(#glow)"/>
  <rect x="1380" y="440" width="65" height="28" rx="3" fill="#f4a261" transform="rotate(18,1413,454)" opacity="0.85" filter="url(#glow)"/>
  <rect x="450" y="350" width="50" height="26" rx="3" fill="#6a4c93" transform="rotate(-8,475,363)" opacity="0.8" filter="url(#glow)"/>
  <rect x="980" y="310" width="58" height="26" rx="3" fill="#e9c46a" transform="rotate(14,1009,323)" opacity="0.8" filter="url(#glow)"/>

  <!-- Particle sparkles around towers -->
  <g filter="url(#glow)" opacity="0.9">
    <circle cx="340" cy="440" r="4" fill="#ffd93d"/>
    <circle cx="310" cy="500" r="3" fill="#ff6b6b"/>
    <circle cx="370" cy="560" r="4" fill="#4ecdc4"/>
    <circle cx="800" cy="310" r="5" fill="#ffd93d"/>
    <circle cx="770" cy="370" r="3" fill="#9b72cf"/>
    <circle cx="830" cy="420" r="4" fill="#ff6b6b"/>
    <circle cx="1260" cy="460" r="4" fill="#4ecdc4"/>
    <circle cx="1230" cy="530" r="3" fill="#ffd93d"/>
    <circle cx="1290" cy="490" r="4" fill="#ff6b6b"/>
  </g>

  <!-- Title -->
  <text x="803" y="228" font-family="monospace" font-size="88" font-weight="900" fill="#000" opacity="0.5" text-anchor="middle" letter-spacing="2">FREAKY TOWERS</text>
  <text x="800" y="225" font-family="monospace" font-size="88" font-weight="900" fill="#e9c46a" text-anchor="middle" letter-spacing="2" filter="url(#softglow)">FREAKY TOWERS</text>
  <text x="800" y="225" font-family="monospace" font-size="88" font-weight="900" fill="none" stroke="#ffd93d" stroke-width="1.5" text-anchor="middle" letter-spacing="2" opacity="0.6">FREAKY TOWERS</text>

  <!-- Subtitle -->
  <text x="800" y="268" font-family="monospace" font-size="28" fill="#9b72cf" text-anchor="middle" letter-spacing="6" filter="url(#glow)">PHYSICS PUZZLE</text>

  <!-- Decorative lines -->
  <line x1="0" y1="284" x2="610" y2="284" stroke="#6a4c93" stroke-width="1" opacity="0.4"/>
  <line x1="990" y1="284" x2="1600" y2="284" stroke="#6a4c93" stroke-width="1" opacity="0.4"/>

  <!-- Scanlines overlay -->
  <g opacity="0.03">
    <rect x="0" y="0" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="6" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="12" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="18" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="24" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="30" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="36" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="42" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="48" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="54" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="60" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="66" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="72" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="78" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="84" width="1600" height="2" fill="#fff"/>
    <rect x="0" y="90" width="1600" height="2" fill="#fff"/>
  </g>
</svg>
