<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <rect width="64" height="64" fill="#00000000"/>

  <!-- Glow -->
  <rect x="18" y="8"  width="28" height="48" fill="#ffe066" opacity="0.18"/>
  <rect x="14" y="12" width="36" height="40" fill="#ffe066" opacity="0.12"/>

  <!-- Egg body -->
  <rect x="22" y="6"  width="20" height="4"  fill="#ffd700"/>
  <rect x="18" y="10" width="28" height="4"  fill="#ffd700"/>
  <rect x="16" y="14" width="32" height="4"  fill="#ffd700"/>
  <rect x="14" y="18" width="36" height="22" fill="#ffd700"/>
  <rect x="16" y="40" width="32" height="4"  fill="#ffd700"/>
  <rect x="18" y="44" width="28" height="4"  fill="#ffd700"/>
  <rect x="22" y="48" width="20" height="4"  fill="#ffd700"/>
  <rect x="26" y="52" width="12" height="4"  fill="#ffd700"/>

  <!-- Shading (dark) -->
  <rect x="42" y="14" width="4" height="30" fill="#c47800" opacity="0.6"/>
  <rect x="46" y="18" width="2" height="22" fill="#c47800" opacity="0.4"/>
  <rect x="16" y="40" width="4" height="8"  fill="#c47800" opacity="0.3"/>

  <!-- Highlight -->
  <rect x="22" y="10" width="8"  height="2"  fill="#fff4a0"/>
  <rect x="20" y="12" width="10" height="6"  fill="#fff4a0" opacity="0.7"/>
  <rect x="22" y="18" width="6"  height="4"  fill="#ffffff" opacity="0.4"/>

  <!-- Sparkle top -->
  <rect x="30" y="2"  width="4" height="2"  fill="#ffe066"/>
  <rect x="32" y="0"  width="2" height="4"  fill="#ffe066"/>

  <!-- Sparkle right -->
  <rect x="52" y="26" width="4" height="2"  fill="#ffe066"/>
  <rect x="54" y="24" width="2" height="6"  fill="#ffe066"/>

  <!-- Sparkle left -->
  <rect x="8"  y="20" width="4" height="2"  fill="#ffe066" opacity="0.8"/>
</svg>
