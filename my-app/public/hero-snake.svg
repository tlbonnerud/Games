<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#0a0a20"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Grid lines (subtle) -->
  <!-- Vertical lines every 40px -->
  <g stroke="#0d2a3a" stroke-width="1" opacity="0.7">
    <line x1="40" y1="0" x2="40" y2="900"/>
    <line x1="80" y1="0" x2="80" y2="900"/>
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="160" y1="0" x2="160" y2="900"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="900"/>
    <line x1="280" y1="0" x2="280" y2="900"/>
    <line x1="320" y1="0" x2="320" y2="900"/>
    <line x1="360" y1="0" x2="360" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="440" y1="0" x2="440" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="520" y1="0" x2="520" y2="900"/>
    <line x1="560" y1="0" x2="560" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="640" y1="0" x2="640" y2="900"/>
    <line x1="680" y1="0" x2="680" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="760" y1="0" x2="760" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="840" y1="0" x2="840" y2="900"/>
    <line x1="880" y1="0" x2="880" y2="900"/>
    <line x1="920" y1="0" x2="920" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1040" y1="0" x2="1040" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/>
    <line x1="1120" y1="0" x2="1120" y2="900"/>
    <line x1="1160" y1="0" x2="1160" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1240" y1="0" x2="1240" y2="900"/>
    <line x1="1280" y1="0" x2="1280" y2="900"/>
    <line x1="1320" y1="0" x2="1320" y2="900"/>
    <line x1="1360" y1="0" x2="1360" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
    <line x1="1440" y1="0" x2="1440" y2="900"/>
    <line x1="1480" y1="0" x2="1480" y2="900"/>
    <line x1="1520" y1="0" x2="1520" y2="900"/>
    <line x1="1560" y1="0" x2="1560" y2="900"/>
  </g>
  <!-- Horizontal lines every 40px -->
  <g stroke="#0d2a3a" stroke-width="1" opacity="0.7">
    <line x1="0" y1="40" x2="1600" y2="40"/>
    <line x1="0" y1="80" x2="1600" y2="80"/>
    <line x1="0" y1="120" x2="1600" y2="120"/>
    <line x1="0" y1="160" x2="1600" y2="160"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="240" x2="1600" y2="240"/>
    <line x1="0" y1="280" x2="1600" y2="280"/>
    <line x1="0" y1="320" x2="1600" y2="320"/>
    <line x1="0" y1="360" x2="1600" y2="360"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="440" x2="1600" y2="440"/>
    <line x1="0" y1="480" x2="1600" y2="480"/>
    <line x1="0" y1="520" x2="1600" y2="520"/>
    <line x1="0" y1="560" x2="1600" y2="560"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="640" x2="1600" y2="640"/>
    <line x1="0" y1="680" x2="1600" y2="680"/>
    <line x1="0" y1="720" x2="1600" y2="720"/>
    <line x1="0" y1="760" x2="1600" y2="760"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="0" y1="840" x2="1600" y2="840"/>
    <line x1="0" y1="880" x2="1600" y2="880"/>
  </g>

  <!-- Neon snake body – spiral/curve path -->
  <!-- Tail glow segments (faded) -->
  <g filter="url(#glow)" opacity="0.3">
    <rect x="200" y="720" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="240" y="720" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="280" y="720" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="320" y="720" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="360" y="720" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="360" y="680" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="360" y="640" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="360" y="600" width="36" height="36" rx="4" fill="#00ffcc"/>
  </g>
  <!-- Mid segments -->
  <g filter="url(#glow)" opacity="0.55">
    <rect x="360" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="400" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="440" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="480" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="520" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="560" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="600" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="640" y="560" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="640" y="520" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="640" y="480" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="640" y="440" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="640" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="680" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="720" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="760" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="800" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
  </g>
  <!-- Bright head segments -->
  <g filter="url(#glow-strong)" opacity="0.9">
    <rect x="840" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="880" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="920" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="960" y="400" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="960" y="360" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="960" y="320" width="36" height="36" rx="4" fill="#00ffcc"/>
    <rect x="960" y="280" width="36" height="36" rx="4" fill="#00ffcc"/>
  </g>
  <!-- Snake head -->
  <g filter="url(#glow-strong)">
    <rect x="956" y="236" width="44" height="44" rx="6" fill="#00ffee"/>
    <!-- Eyes -->
    <rect x="964" y="244" width="8" height="8" fill="#ffffff"/>
    <rect x="980" y="244" width="8" height="8" fill="#ffffff"/>
    <rect x="966" y="246" width="4" height="4" fill="#003322"/>
    <rect x="982" y="246" width="4" height="4" fill="#003322"/>
    <!-- Tongue -->
    <rect x="974" y="278" width="4" height="10" fill="#ff4466"/>
    <rect x="970" y="286" width="4" height="4" fill="#ff4466"/>
    <rect x="978" y="286" width="4" height="4" fill="#ff4466"/>
  </g>

  <!-- Food apple (glowing red dot) -->
  <g filter="url(#glow-strong)">
    <rect x="1156" y="276" width="40" height="40" rx="20" fill="#ff3344"/>
    <rect x="1170" y="268" width="12" height="8" fill="#22aa44"/>
    <rect x="1164" y="284" width="12" height="12" fill="#ff6677"/>
  </g>

  <!-- Score display -->
  <rect x="1300" y="80" width="260" height="120" rx="8" fill="#001428aa"/>
  <rect x="1300" y="80" width="260" height="120" rx="8" fill="none" stroke="#00ffcc44" stroke-width="2"/>
  <text x="1430" y="130" font-family="monospace" font-size="22" fill="#00ffcc88" text-anchor="middle" letter-spacing="2">SCORE</text>
  <text x="1430" y="175" font-family="monospace" font-size="44" fill="#00ffcc" text-anchor="middle" font-weight="bold" filter="url(#glow)">04820</text>

  <!-- Title -->
  <rect x="0" y="750" width="1600" height="150" fill="#00000066"/>
  <text x="800" y="830" font-family="monospace" font-size="88" font-weight="bold" fill="#00ffcc" text-anchor="middle" letter-spacing="6" filter="url(#glow)">NEON SNAKE</text>
  <text x="800" y="880" font-family="monospace" font-size="30" fill="#00ffcc88" text-anchor="middle" letter-spacing="3">Retro · Fast · High Score Chase</text>
</svg>
